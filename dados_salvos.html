<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dados Salvos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" />
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #b3ad5f;
            margin: 0;
            padding: 0;
            font-size: 8px; /* Tamanho da fonte ainda mais reduzido */
        }

        .menu {
            background-color: #333;
            overflow: hidden;
            padding: 2px 0; /* Reduzido para se ajustar melhor */
            display: flex;
            justify-content: space-around;
        }

        .menu a {
            color: white;
            text-align: center;
            padding: 4px 6px; /* Reduzido para se ajustar melhor */
            text-decoration: none;
            font-size: 8px; /* Tamanho da fonte reduzido */
        }

        .menu a:hover {
            background-color: #555;
            color: rgb(255, 255, 255);
        }

        h2 {
            text-align: center;
            margin: 6px 0; /* Reduzido para se ajustar melhor */
            font-size: 12px; /* Tamanho da fonte reduzido */
        }

        .table-container {
            margin: 0 auto;
            width: 100%;
            overflow-x: auto;
            padding: 6px; /* Reduzido para se ajustar melhor */
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #fff;
            margin: 0 auto;
            font-size: 8px; /* Tamanho da fonte reduzido */
            table-layout: fixed; /* Layout fixo para melhorar a responsividade */
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 2px; /* Reduzido para se ajustar melhor */
            text-align: left;
            word-wrap: break-word; /* Quebra de linha automática para textos longos */
        }

        th {
            background-color: #bcda50;
            color: white;
        }

        .buttons {
            text-align: center;
            margin: 6px 0; /* Reduzido para se ajustar melhor */
        }

        .buttons button {
            padding: 3px 6px; /* Reduzido para se ajustar melhor */
            font-size: 8px; /* Tamanho da fonte reduzido */
            background-color: #008080;
            color: rgb(42, 30, 114);
            border: none;
            cursor: pointer;
            border-radius: 4px;
            margin-right: 3px; /* Reduzido para se ajustar melhor */
        }

        .buttons button:hover {
            background-color: #005353;
        }

        /* Estilização personalizada para o input type date */
        input[type="date"] {
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            background-color: #fff;
            border: 1px solid #ccc;
            padding: 4px 8px;
            font-size: 8px;
            border-radius: 4px;
            width: 100%;
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            cursor: pointer;
            background-color: #008080;
            padding: 4px;
            border-radius: 4px;
            color: white;
        }

        input[type="date"]::-webkit-calendar-picker-indicator:hover {
            background-color: #005353;
        }

        @media print {
            body {
                font-size: 6pt;
                background-color: #fff;
            }

            .menu,
            .buttons {
                display: none;
            }

            table {
                width: 100%;
                page-break-inside: auto;
                page-break-after: auto;
            }

            table tr,
            table td {
                page-break-inside: avoid;
                page-break-after: auto;
            }
        }

        @media (max-width: 600px) {
            .menu {
                flex-direction: column;
            }

            table {
                font-size: 6px; /* Ajusta o tamanho da fonte em telas menores */
            }

            th,
            td {
                padding: 2px; /* Ajuste adicional de padding */
            }
        }

        .delete-btn {
            background-color: #ac762f;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 4px;
            padding: 1px 3px; /* Reduzido para se ajustar melhor */
            font-size: 8px; /* Tamanho da fonte reduzido */
        }

        .delete-btn:hover {
            background-color: #0047cc;
        }

        .save-btn {
            background-color: #4CAF50;
            color: rgb(104, 42, 42);
            border: none;
            cursor: pointer;
            border-radius: 4px;
            padding: 3px 6px; /* Reduzido para se ajustar melhor */
            font-size: 8px; /* Tamanho da fonte reduzido */
            margin-left: 3px; /* Espaçamento entre botões */
        }

        .save-btn:hover {
            background-color: #45a049;
        }

        /* Estilos para células editáveis */
        td[contenteditable="true"] {
            background-color: #f9f9f9;
            cursor: text;
        }

        td[contenteditable="true"]:focus {
            outline: none;
            background-color: #e0f7fa;
        }
    </style>
</head>

<body>
    <div class="menu">
        <a href="index.html">Controle</a>
        <a href="dados_salvos.html">Dados Salvos</a>
        <a href="contact.html">Contato</a>
    </div>

    <h2>Dados Salvos</h2>

    <div class="buttons">
        <button onclick="window.print()"><i class="fas fa-print"></i> Imprimir Pagina</button>
        <button class="save-btn" id="saveDataBtn"><i class="fas fa-save"></i> Salvar Dados</button>
    </div>

    <div class="table-container">
        <table id="dataTable">
            <thead>
                <tr>
                    <th>Conta</th>
                    <th>Horario</th>
                    <th>Data</th>
                    <th>Vencimento</th>
                    <th>%</th>
                    <th>Banco</th>
                    <th>Valor</th>
                    <th>Acrescimo</th>
                    <th>Valor Total</th>
                    <th>Pago</th>
                    <th>Acao</th>
                </tr>
            </thead>
            <tbody>
                <!-- Os dados serão carregados dinamicamente com jQuery -->
            </tbody>
        </table>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script>
        $(document).ready(function () {
            let data = JSON.parse(localStorage.getItem('financeData')) || [];
            const tableBody = $('#dataTable tbody');

            function renderTable() {
                tableBody.empty();
                data.forEach((row, index) => {
                    const rowElement = `<tr data-index="${index}">
                        <td data-label="Conta" contenteditable="true">${row.conta}</td>
                        <td data-label="horario" contenteditable="true">${row.horario}</td>
                        <td data-label="Data" contenteditable="true">${row.data}</td>
                        <td data-label="Vencimento" contenteditable="true">${row.vencimento}</td>
                        <td data-label="%" contenteditable="true">${row.aumento}</td>
                        <td data-label="Banco" contenteditable="true">${row.prazo}</td>
                        <td data-label="Valor" contenteditable="true">${row.valor}</td>
                        <td data-label="Acrescimo" contenteditable="true">${row.valorAcrescimo}</td>
                        <td data-label="Valor Total" contenteditable="true">${row.valorTotal}</td>
                        <td data-label="Pago" contenteditable="true">${row.pago ? 'Sim' : 'Nao'}</td>
                        <td data-label="Acao"><button class="delete-btn">Excluir</button></td>
                    </tr>`;
                    tableBody.append(rowElement);
                });
            }

            renderTable();

            $('#dataTable').on('click', '.delete-btn', function () {
                const rowIndex = $(this).closest('tr').data('index');
                data = data.filter((_, index) => index !== rowIndex);
                localStorage.setItem('financeData', JSON.stringify(data));
                renderTable();
            });

            $('#saveDataBtn').click(function () {
                $('#dataTable tbody tr').each(function () {
                    const index = $(this).data('index');
                    const updatedRow = {
                        conta: $(this).find('td:eq(0)').text(),
                        horario: $(this).find('td:eq(1)').text(),
                        data: $(this).find('td:eq(2)').text(),
                        vencimento: $(this).find('td:eq(3)').text(),
                        aumento: $(this).find('td:eq(4)').text(),
                        prazo: $(this).find('td:eq(5)').text(),
                        valor: $(this).find('td:eq(6)').text(),
                        valorAcrescimo: $(this).find('td:eq(7)').text(),
                        valorTotal: $(this).find('td:eq(8)').text(),
                        pago: $(this).find('td:eq(9)').text() === 'Sim'
                    };
                    data[index] = updatedRow;
                });
                localStorage.setItem('financeData', JSON.stringify(data));
                alert('Dados salvos com sucesso!');
            });
        });
    </script>
</body>

</html>
