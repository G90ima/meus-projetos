<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dados Salvos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
            font-size: 15px;
            color: #333;
        }

        .menu {
            background-color: #2c3e50;
            padding: 15px 0;
            display: flex;
            justify-content: center;
            gap: 25px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .menu a {
            color: white;
            padding: 12px 20px;
            text-decoration: none;
            font-size: 16px;
            border-radius: 6px;
            transition: 0.3s;
        }

        .menu a:hover {
            background-color: #34495e;
        }

        h2 {
            text-align: center;
            margin: 30px 0 20px;
            color: #2c3e50;
            font-size: 28px;
        }

        .buttons {
            text-align: center;
            margin: 20px 0 25px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .buttons button {
            padding: 12px 20px;
            font-size: 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .buttons button:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        #printBtn    { background-color: #3498db; color: white; }
        #saveBtn     { background-color: #27ae60; color: white; }
        #exportBtn   { background-color: #f39c12; color: white; }
        #clearAllBtn { background-color: #e74c3c; color: white; }

        .table-container {
            margin: 0 auto;
            width: 95%;
            max-width: 1450px;
            overflow-x: auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
            padding: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 15.5px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 14px 10px;
            text-align: left;
        }

        th {
            background-color: #2c7a3f;
            color: white;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        tr:nth-child(even) {
            background-color: #f8f9fa;
        }

        td[contenteditable="true"] {
            background-color: #fffbeb;
            cursor: text;
        }

        td[contenteditable="true"]:focus {
            outline: 3px solid #3498db;
            background-color: #e8f4fd;
        }

        .delete-btn {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .delete-btn:hover {
            background-color: #c0392b;
        }

        @media print {
            body { background: white; }
            .menu, .buttons { display: none !important; }
            .table-container { box-shadow: none; width: 100%; margin: 0; padding: 0; }
        }

        @media (max-width: 768px) {
            .menu { flex-direction: column; gap: 10px; padding: 10px; }
            .buttons { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>

    <div class="menu">
        <a href="index.html"><i class="fas fa-home"></i> Controle</a>
        <a href="dados_salvos.html"><i class="fas fa-table"></i> Dados Salvos</a>
        <a href="contact.html"><i class="fas fa-envelope"></i> Contato</a>
    </div>

    <h2>Dados Salvos</h2>

    <div class="buttons">
        <button id="printBtn"><i class="fas fa-print"></i> Imprimir</button>
        <button id="saveBtn"><i class="fas fa-save"></i> Salvar Alterações</button>
        <button id="exportBtn"><i class="fas fa-file-excel"></i> Exportar Excel</button>
        <button id="clearAllBtn"><i class="fas fa-trash"></i> Excluir Todos</button>
    </div>

    <div class="table-container">
        <table id="dataTable">
            <thead>
                <tr>
                    <th>Conta</th>
                    <th>Horário</th>
                    <th>Data</th>
                    <th>Vencimento</th>
                    <th>%</th>
                    <th>Banco</th>
                    <th>Valor</th>
                    <th>Acréscimo</th>
                    <th>Valor Total</th>
                    <th>Pago</th>
                    <th>Ação</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
<script>
    $(document).ready(function () {
        let data = JSON.parse(localStorage.getItem('financeData')) || [];

        const tableBody = $('#dataTable tbody');

        function renderTable() {
            tableBody.empty();
            data.forEach((row, index) => {
                const tr = $(`
                    <tr data-index="${index}">
                        <td contenteditable="true">${row.conta || ''}</td>
                        <td contenteditable="true">${row.horario || ''}</td>
                        <td contenteditable="true">${row.data || ''}</td>
                        <td contenteditable="true">${row.vencimento || ''}</td>
                        <td contenteditable="true">${row.aumento || ''}</td>
                        <td contenteditable="true">${row.banco || row.prazo || ''}</td>
                        <td contenteditable="true">${row.valor || ''}</td>
                        <td contenteditable="true">${row.valorAcrescimo || ''}</td>
                        <td contenteditable="true">${row.valorTotal || ''}</td>
                        <td contenteditable="true">${row.pago ? 'Sim' : 'Não'}</td>
                        <td><button class="delete-btn">Excluir</button></td>
                    </tr>
                `);
                tableBody.append(tr);
            });
        }

        renderTable();

        // === NOVA FUNÇÃO: Encontrar a maior % e a data correspondente ===
        function mostrarMaiorPorcentagem() {
            if (data.length === 0) {
                console.log("Nenhum dado encontrado.");
                return null;
            }

            let maior = -Infinity;
            let dataMaior = "";
            let linhaInfo = "";

            data.forEach(row => {
                // Converte o % para número (remove % se tiver e trata vírgula)
                let percStr = (row.aumento || "").toString().trim().replace('%', '').replace(',', '.');
                let perc = parseFloat(percStr);

                if (!isNaN(perc) && perc > maior) {
                    maior = perc;
                    dataMaior = row.data || "Data não informada";
                    linhaInfo = `Conta: ${row.conta || ''} | Valor: ${row.valor || ''} | Total: ${row.valorTotal || ''}`;
                }
            });

            if (maior === -Infinity) {
                console.log("Nenhuma porcentagem válida encontrada.");
                return null;
            }

            console.log(`✅ Maior % encontrado: ${maior}% na data ${dataMaior}`);
            console.log(linhaInfo);

            // Mostra um alerta bonitinho
            alert(`📊 MAIOR PORCENTAGEM:\n\n` +
                  `Porcentagem: ${maior}%\n` +
                  `Data: ${dataMaior}\n\n` +
                  `${linhaInfo}`);

            return { porcentagem: maior, data: dataMaior };
        }

        // Chama automaticamente ao carregar a página
        setTimeout(() => {
            mostrarMaiorPorcentagem();
        }, 800);

        // Botão para consultar manualmente (opcional)
        // Você pode adicionar um botão novo se quiser

        // Excluir linha individual (mantido)
        $('#dataTable').on('click', '.delete-btn', function () {
            if (confirm('Tem certeza que deseja excluir esta linha?')) {
                const index = $(this).closest('tr').data('index');
                data.splice(index, 1);
                localStorage.setItem('financeData', JSON.stringify(data));
                renderTable();
                setTimeout(mostrarMaiorPorcentagem, 300); // atualiza após excluir
            }
        });

        // Salvar alterações (atualizado para recalcular)
        $('#saveBtn').click(function () {
            $('#dataTable tbody tr').each(function () {
                const index = $(this).data('index');
                if (index !== undefined) {
                    data[index] = {
                        conta: $(this).find('td:eq(0)').text().trim(),
                        horario: $(this).find('td:eq(1)').text().trim(),
                        data: $(this).find('td:eq(2)').text().trim(),
                        vencimento: $(this).find('td:eq(3)').text().trim(),
                        aumento: $(this).find('td:eq(4)').text().trim(),
                        banco: $(this).find('td:eq(5)').text().trim(),
                        valor: $(this).find('td:eq(6)').text().trim(),
                        valorAcrescimo: $(this).find('td:eq(7)').text().trim(),
                        valorTotal: $(this).find('td:eq(8)').text().trim(),
                        pago: $(this).find('td:eq(9)').text().trim().toLowerCase() === 'sim'
                    };
                }
            });
            localStorage.setItem('financeData', JSON.stringify(data));
            alert('✅ Dados salvos com sucesso!');
            setTimeout(mostrarMaiorPorcentagem, 300);
        });

        // Exportar, limpar e imprimir mantidos iguais...
        $('#exportBtn').click(function () { /* seu código original */ });
        $('#clearAllBtn').click(function () { /* seu código original */ });
        $('#printBtn').click(() => window.print());
    });
</script>
  
</body>
</html>
