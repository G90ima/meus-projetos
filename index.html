<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle Financeiro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css">
    
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root {
            --primary-dark: #2c3e50;
            --success-green: #27ae60;
            --warning-red: #e74c3c;
            --accent-blue: #3498db;
            --table-header: #2c7a3f;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 50%, #2c7a3f 100%);
            color: #333;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            background-color: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(12px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
            padding: 0;
            width: 100%;
            position: fixed;
            top: 0;
            z-index: 1000;
        }

        .navbar-brand {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--primary-dark) !important;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .navbar-nav .nav-link {
            color: #333 !important;
            font-weight: 500;
            padding: 16px 22px;
            transition: all 0.3s ease;
        }

        .navbar-nav .nav-link:hover,
        .navbar-nav .nav-link.active {
            color: var(--primary-dark) !important;
            background-color: rgba(44, 62, 80, 0.08);
        }

        .container {
            max-width: 1280px;
            margin: 90px auto 40px;
            padding: 30px;
            background-color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border-radius: 16px;
            border: 1px solid rgba(44, 122, 63, 0.15);
        }

        h2 {
            text-align: center;
            color: var(--primary-dark);
            font-weight: 700;
            margin-bottom: 30px;
        }

        .summary {
            display: flex;
            gap: 25px;
            margin-bottom: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .summary label {
            display: flex;
            flex-direction: column;
            font-weight: 600;
            color: #444;
            min-width: 220px;
        }

        .summary input {
            padding: 12px 16px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1.1rem;
        }

        .summary input:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.15);
            outline: none;
        }

        .summary input[readonly] {
            background-color: #f8f9fa;
            font-weight: 700;
        }

        .buttons {
            text-align: center;
            margin: 30px 0;
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(90deg, var(--primary-dark), #34495e);
            border: none;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(44, 62, 80, 0.4);
        }

        .btn-success {
            background-color: var(--success-green);
            border: none;
        }

        .btn-success:hover {
            background-color: #219653;
        }

        .table-container {
            overflow-x: auto;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-top: 10px;
        }

        th {
            background: linear-gradient(90deg, var(--table-header), #27ae60);
            color: white;
            font-weight: 600;
            padding: 14px 10px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        td {
            padding: 12px 10px;
            vertical-align: middle;
            border-bottom: 1px solid #eee;
        }

        tr:nth-child(even) {
            background-color: #f8f9fa;
        }

        tr:hover {
            background-color: #f0f8f7;
        }

        input.form-control, select.form-select {
            border-radius: 8px;
            border: 1px solid #ced4da;
            padding: 8px 12px;
        }

        input.form-control:focus, select.form-select:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
        }

        .valorTotal {
            font-weight: 700;
            font-size: 1.05rem;
        }

        .pago:checked + .valorTotal {
            color: var(--success-green) !important;
        }

        footer {
            margin-top: auto;
            padding: 25px;
            text-align: center;
            color: rgba(255,255,255,0.9);
            background: rgba(0, 0, 0, 0.3);
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="index2.html">
                <i class="fas fa-chart-line menu-icon"></i>Controle Financeiro
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="index2.html">
                            <i class="fas fa-home menu-icon"></i>Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="dados_salvos.html">
                            <i class="fas fa-database menu-icon"></i>Dados Salvos
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="contact.html">
                            <i class="fas fa-envelope menu-icon"></i>Contato
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="index.html">
                            <i class="fas fa-link menu-icon"></i>Controle
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">      
        <h2><i class="fas fa-coins"></i> Controle Financeiro</h2>

        <div class="summary">
            <label>Valor Salarial: 
                <input type="text" id="valorSalarial" value="0.00" oninput="updateSummary()" class="form-control">
            </label>
            <label>Total Pago: 
                <input type="text" id="totalPago" value="0.00" readonly class="form-control">
            </label>
            <label>Total Não Pago: 
                <input type="text" id="totalNaoPago" value="0.00" readonly class="form-control">
            </label>
        </div>

        <div class="buttons">
            <button class="btn btn-primary" onclick="importExcel()">
                <i class="fas fa-upload"></i> Importar Excel
            </button>
            <button class="btn btn-primary" onclick="exportToExcel()">
                <i class="fas fa-download"></i> Exportar Excel
            </button>
            <button class="btn btn-primary" onclick="saveData()">
                <i class="fas fa-save"></i> Salvar Dados
            </button>
            <button class="btn btn-success" id="addRowButton">
                <i class="fas fa-plus-circle"></i> Adicionar Linha
            </button>
        </div>

        <div class="table-container">
            <table id="dataTable" class="table table-bordered">
                <thead>
                    <tr>
                        <th>Contas</th>
                        <th>Horário</th>
                        <th>Data</th>
                        <th>Vencimento</th>
                        <th>Aumento</th>
                        <th>Banco</th>
                        <th>Valor</th>
                        <th>Acréscimo</th>
                        <th class="valorTotal">Valor Total</th>
                        <th>Pago</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Primeira linha de exemplo -->
                    <tr>
                        <td><input type="text" class="conta form-control" value="" oninput="calculateTotal(this)"></td>
                        <td><input type="text" class="horario form-control" readonly onclick="displayCurrentTime(this)"></td>
                        <td><input type="text" class="data datepicker form-control" readonly onclick="displayCurrentDate(this)"></td>
                        <td><input type="text" class="vencimento datepicker form-control" value="" oninput="calculateTotal(this)"></td>
                        <td>
                            <select class="aumento form-select" onchange="calculateTotal(this)">
                                <option value="0.025">0.025%</option>
                                <option value="0.5">0.5%</option>
                                <option value="1">1%</option>
                                <option value="2">2%</option>
                                <option value="3">3%</option>
                                <option value="4">0.7%</option>
                                <option value="5">0.8%</option>
                                <option value="0" selected>0%</option>
                            </select>
                        </td>
                        <td>
                            <select class="prazo form-select" onchange="calculateTotal(this)">
                                <option value="BB">BB</option>
                                <option value="Bradesco">Bradesco</option>
                                <option value="PAN">PAN</option>
                                <option value="CAIXA">Caixa</option>
                                <option value="Inter">Inter</option>
                                <option value="Bradesco" selected>Bradesco</option>
                            </select>
                        </td>
                        <td><input type="text" class="valor form-control" value="0.00" oninput="calculateTotal(this)"></td>
                        <td><input type="text" class="valorAcrescimo form-control" value="0.00" readonly></td>
                        <td><input type="text" class="valorTotal form-control" value="0.00" readonly></td>
                        <td><input type="checkbox" class="pago" onclick="calculateTotal(this)"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Controle Financeiro • gilmar chagas nobre • Todos os direitos reservados.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>

    <script>
        $(function () {
            $(".datepicker").datepicker({
                dateFormat: 'yy-mm-dd'
            });
        });

        function displayCurrentTime(cell) {
            var currentTime = new Date().toLocaleTimeString();
            cell.value = currentTime;
            calculateTotal(cell);
        }

        function displayCurrentDate(cell) {
            var currentDate = new Date().toISOString().split('T')[0];
            cell.value = currentDate;
            calculateTotal(cell);
        }

        function calculateTotal(element) {
            var row = element.parentElement.parentElement;
            var valor = parseFloat(row.querySelector('.valor').value.replace(',', '.')) || 0;
            var aumento = parseFloat(row.querySelector('.aumento').value) || 0;
            var acrescimo = (valor * (aumento / 100)).toFixed(2);
            var valorTotal = (parseFloat(valor) + parseFloat(acrescimo)).toFixed(2);

            row.querySelector('.valorAcrescimo').value = acrescimo.replace('.', ',');
            row.querySelector('.valorTotal').value = valorTotal.replace('.', ',');

            var isPaid = row.querySelector('.pago').checked;
            row.querySelector('.valorTotal').style.color = isPaid ? '#27ae60' : '#e74c3c';

            updateSummary();
        }

        function updateSummary() {
            var table = document.getElementById('dataTable');
            var totalPago = 0;
            var totalNaoPago = 0;

            for (var i = 1, row; row = table.rows[i]; i++) {
                var valorTotal = parseFloat(row.querySelector('.valorTotal').value.replace(',', '.')) || 0;
                var isPaid = row.querySelector('.pago').checked;

                if (isPaid) {
                    totalPago += valorTotal;
                } else {
                    totalNaoPago += valorTotal;
                }
            }

            document.getElementById('totalPago').value = totalPago.toFixed(2).replace('.', ',');
            document.getElementById('totalNaoPago').value = totalNaoPago.toFixed(2).replace('.', ',');
        }

        function saveData() {
            var table = document.getElementById('dataTable');
            var data = [];
            for (var i = 1, row; row = table.rows[i]; i++) {
                var rowData = {
                    conta: row.cells[0].querySelector('input').value,
                    horario: row.cells[1].querySelector('input').value,
                    data: row.cells[2].querySelector('input').value,
                    vencimento: row.cells[3].querySelector('input').value,
                    aumento: row.cells[4].querySelector('select').value,
                    prazo: row.cells[5].querySelector('select').value,
                    valor: row.cells[6].querySelector('input').value,
                    valorAcrescimo: row.cells[7].querySelector('input').value,
                    valorTotal: row.cells[8].querySelector('input').value,
                    pago: row.cells[9].querySelector('input').checked
                };
                data.push(rowData);
            }
            localStorage.setItem('financeData', JSON.stringify(data));
            localStorage.setItem('valorSalarial', document.getElementById('valorSalarial').value);
            alert('✅ Dados salvos com sucesso!');
        }

        function importExcel() {
            var input = document.createElement('input');
            input.type = 'file';
            input.accept = '.xlsx,.xls';
            input.onchange = function(e) {
                var file = e.target.files[0];
                if (!file) return;
                var reader = new FileReader();
                reader.onload = function(e) {
                    var data = new Uint8Array(e.target.result);
                    var workbook = XLSX.read(data, {type: 'array'});
                    var firstSheetName = workbook.SheetNames[0];
                    var firstSheet = workbook.Sheets[firstSheetName];
                    var json = XLSX.utils.sheet_to_json(firstSheet, {header: 1});
                    var dataRows = json.slice(1);
                    populateTable(dataRows);
                };
                reader.readAsArrayBuffer(file);
            };
            input.click();
        }

        function exportToExcel() {
            var table = document.getElementById('dataTable');
            var data = [];
            var headers = [];
            for (var j = 0; j < table.rows[0].cells.length; j++) {
                headers.push(table.rows[0].cells[j].textContent.trim());
            }
            data.push(headers);
            for (var i = 1; i < table.rows.length; i++) {
                var row = [];
                var cells = table.rows[i].cells;
                for (var j = 0; j < cells.length; j++) {
                    var el = cells[j].querySelector('input, select');
                    if (el) {
                        if (el.type === 'checkbox') {
                            row.push(el.checked ? 'Sim' : 'Não');
                        } else {
                            row.push(el.value);
                        }
                    } else {
                        row.push('');
                    }
                }
                data.push(row);
            }
            var wb = XLSX.utils.book_new();
            var ws = XLSX.utils.aoa_to_sheet(data);
            XLSX.utils.book_append_sheet(wb, ws, 'Financeiro');
            XLSX.writeFile(wb, 'controle_financeiro.xlsx');
        }

        function populateTable(jsonRows) {
            var table = document.getElementById('dataTable');
            var template = table.rows[1].cloneNode(true);
            while (table.rows.length > 1) {
                table.deleteRow(1);
            }
            jsonRows.forEach(function (rowData) {
                var newRow = template.cloneNode(true);
                newRow.querySelector('.conta').value = rowData[0] || '';
                newRow.querySelector('.horario').value = rowData[1] || '';
                newRow.querySelector('.data').value = rowData[2] || '';
                newRow.querySelector('.vencimento').value = rowData[3] || '';
                newRow.querySelector('.aumento').value = rowData[4] || '0';
                newRow.querySelector('.prazo').value = rowData[5] || 'Bradesco';
                newRow.querySelector('.valor').value = rowData[6] || '0.00';
                newRow.querySelector('.valorAcrescimo').value = rowData[7] || '0.00';
                newRow.querySelector('.valorTotal').value = rowData[8] || '0.00';
                var paidValue = rowData[9];
                newRow.querySelector('.pago').checked = (paidValue === true || paidValue === 'Sim' || paidValue === 'true' || paidValue === 1);
                table.appendChild(newRow);
                calculateTotal(newRow.querySelector('.valor'));
            });
            if (table.rows.length === 1) {
                var emptyRow = template.cloneNode(true);
                emptyRow.querySelector('.conta').value = '';
                emptyRow.querySelector('.horario').value = '';
                emptyRow.querySelector('.data').value = '';
                emptyRow.querySelector('.vencimento').value = '';
                emptyRow.querySelector('.aumento').value = '0';
                emptyRow.querySelector('.prazo').value = 'Bradesco';
                emptyRow.querySelector('.valor').value = '0.00';
                emptyRow.querySelector('.valorAcrescimo').value = '0.00';
                emptyRow.querySelector('.valorTotal').value = '0.00';
                emptyRow.querySelector('.pago').checked = false;
                table.appendChild(emptyRow);
            }
            updateSummary();
        }

        document.getElementById('addRowButton').addEventListener('click', function () {
            var table = document.getElementById('dataTable');
            var newRow = table.rows[1].cloneNode(true);
            newRow.querySelector('.conta').value = '';
            newRow.querySelector('.horario').value = '';
            newRow.querySelector('.data').value = '';
            newRow.querySelector('.vencimento').value = '';
            newRow.querySelector('.aumento').value = '0';
            newRow.querySelector('.prazo').value = 'Bradesco';
            newRow.querySelector('.valor').value = '0.00';
            newRow.querySelector('.valorAcrescimo').value = '0.00';
            newRow.querySelector('.valorTotal').value = '0.00';
            newRow.querySelector('.pago').checked = false;
            table.appendChild(newRow);
        });

        document.addEventListener('DOMContentLoaded', function() {
            var savedData = localStorage.getItem('financeData');
            var savedValorSalarial = localStorage.getItem('valorSalarial');
            if (savedValorSalarial) {
                document.getElementById('valorSalarial').value = savedValorSalarial;
            }
            if (savedData) {
                savedData = JSON.parse(savedData);
                var jsonRows = savedData.map(function(d) {
                    return [d.conta, d.horario, d.data, d.vencimento, d.aumento, d.prazo, d.valor, d.valorAcrescimo, d.valorTotal, d.pago];
                });
                populateTable(jsonRows);
            } else {
                updateSummary();
            }

            var currentPage = window.location.pathname.split('/').pop() || 'index.html';
            document.querySelectorAll('.nav-link').forEach(function(link) {
                if (link.getAttribute('href') === currentPage) {
                    link.classList.add('active');
                }
            });
        });
    </script>
</body>
</html>
