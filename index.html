<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle Financeiro</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css">
    
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root {
            --primary-dark: #2c3e50;
            --success-green: #27ae60;
            --warning-red: #e74c3c;
            --accent-blue: #3498db;
            --table-header: #2c7a3f;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 50%, #2c7a3f 100%);
            color: #333;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .navbar {
            background-color: rgba(255,255,255,0.97);
            backdrop-filter: blur(12px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }

        .container {
            max-width: 1280px;
            margin: 100px auto 40px;
            padding: 15px;
            background-color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border-radius: 16px;
        }

        h2 {
            text-align: center;
            color: var(--primary-dark);
            margin-bottom: 20px;
        }

        .summary {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .summary label {
            display: flex;
            flex-direction: column;
            font-weight: 600;
            color: #444;
            min-width: 160px;
        }

        .summary input {
            padding: 10px 12px;
            font-size: 1rem;
            border-radius: 8px;
            border: 2px solid #ddd;
        }

        .buttons {
            text-align: center;
            margin: 20px 0 25px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .table-container {
            overflow-x: auto;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            -webkit-overflow-scrolling: touch;
        }

        table {
            width: 100%;
            min-width: 920px;
            border-collapse: separate;
            border-spacing: 0;
        }

        th {
            background: linear-gradient(90deg, var(--table-header), #27ae60);
            color: white;
            padding: 12px 6px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 10;
            font-size: 0.9rem;
            white-space: nowrap;
        }

        td {
            padding: 8px 6px;
            vertical-align: middle;
        }

        td input.form-control,
        td select.form-select {
            font-size: 0.87rem;
            padding: 6px 8px;
            height: auto;
        }

        /* Larguras otimizadas */
        .conta { min-width: 140px; }
        .horario { min-width: 95px; }
        .data, .vencimento { min-width: 110px; }
        .aumento { min-width: 85px; }
        .prazo { min-width: 90px; }
        .valor, .valorAcrescimo, .valorTotal { 
            min-width: 92px; 
            font-weight: 600;
        }

        tr:nth-child(even) { background-color: #f8f9fa; }
        tr:hover { background-color: #f0f8f7; }

        /* Calendário otimizado para celular */
        .ui-datepicker {
            font-size: 0.8rem !important;
            width: 210px !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .ui-datepicker th, .ui-datepicker td {
            padding: 4px !important;
        }

        footer {
            margin-top: 30px;
            padding: 18px;
            text-align: center;
            color: rgba(255,255,255,0.9);
            background: rgba(0, 0, 0, 0.3);
            font-size: 0.9rem;
        }

        .valorTotal {
            font-weight: 700;
            font-size: 1.05rem;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="#"><i class="fas fa-chart-line"></i> Controle Financeiro</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="#"><i class="fas fa-home"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="#"><i class="fas fa-database"></i> Dados Salvos</a></li>
                    <li class="nav-item"><a class="nav-link" href="#"><i class="fas fa-envelope"></i> Contato</a></li>
                    <li class="nav-item"><a class="nav-link active" href="#"><i class="fas fa-link"></i> Controle</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">      
        <h2><i class="fas fa-coins"></i> Controle Financeiro</h2>

        <div class="summary">
            <label>Valor Salarial: 
                <input type="text" id="valorSalarial" value="0.00" oninput="updateSummary()" class="form-control">
            </label>
            <label>Total Pago: 
                <input type="text" id="totalPago" value="0.00" readonly class="form-control">
            </label>
            <label>Total Não Pago: 
                <input type="text" id="totalNaoPago" value="0.00" readonly class="form-control">
            </label>
        </div>

        <div class="buttons">
            <button class="btn btn-primary" onclick="importExcel()"><i class="fas fa-upload"></i> Importar Excel</button>
            <button class="btn btn-primary" onclick="exportToExcel()"><i class="fas fa-download"></i> Exportar Excel</button>
            <button class="btn btn-primary" onclick="saveData()"><i class="fas fa-save"></i> Salvar Dados</button>
            <button class="btn btn-success" id="addRowButton"><i class="fas fa-plus-circle"></i> Nova Linha</button>
        </div>

        <div class="table-container">
            <table id="dataTable" class="table table-bordered">
                <thead>
                    <tr>
                        <th>Contas</th>
                        <th>Horário</th>
                        <th>Data</th>
                        <th>Vencimento</th>
                        <th>Aumento (%)</th>
                        <th>Banco</th>
                        <th>Valor</th>
                        <th>Acréscimo</th>
                        <th>Valor Total</th>
                        <th>Pago</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Linha inicial -->
                    <tr>
                        <td><input type="text" class="conta form-control" oninput="calculateTotal(this)"></td>
                        <td><input type="text" class="horario form-control" readonly onclick="displayCurrentTime(this)"></td>
                        <td><input type="text" class="data form-control" readonly onclick="displayCurrentDate(this)"></td>
                        <td><input type="text" class="vencimento datepicker form-control" readonly onclick="displayCurrentDate(this)"></td>
                        <td><input type="number" step="0.01" class="aumento form-control" value="0" oninput="calculateTotal(this)" placeholder="0.00"></td>
                        <td>
                            <select class="prazo form-select" onchange="calculateTotal(this)">
                                <option value="BB">BB</option>
                                <option value="Bradesco" selected>Bradesco</option>
                                <option value="PAN">PAN</option>
                                <option value="CAIXA">Caixa</option>
                                <option value="Inter">Inter</option>
                            </select>
                        </td>
                        <td><input type="text" class="valor form-control" value="0.00" oninput="calculateTotal(this)"></td>
                        <td><input type="text" class="valorAcrescimo form-control" value="0.00" readonly></td>
                        <td><input type="text" class="valorTotal form-control" value="0.00" readonly></td>
                        <td><input type="checkbox" class="pago" onclick="calculateTotal(this)"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Controle Financeiro • gilmar chagas nobre • Todos os direitos reservados.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // ==================== CALENDÁRIO ====================
        $(function () {
            $(".datepicker").datepicker({
                dateFormat: 'yy-mm-dd',
                changeMonth: true,
                changeYear: true,
                showButtonPanel: true
            });
        });

        function displayCurrentDate(cell) {
            if (!cell.value) {
                cell.value = new Date().toISOString().split('T')[0];
            }
            calculateTotal(cell);
        }

        function displayCurrentTime(cell) {
            var now = new Date();
            cell.value = now.toLocaleTimeString('pt-BR', { 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit' 
            });
            calculateTotal(cell);
        }

        // ==================== CÁLCULO ====================
        function calculateTotal(element) {
            var row = element.closest('tr');
            var valor = parseFloat(row.querySelector('.valor').value.replace(',', '.')) || 0;
            var aumento = parseFloat(row.querySelector('.aumento').value) || 0;

            var acrescimo = (valor * (aumento / 100)).toFixed(2);
            var valorTotal = (valor + parseFloat(acrescimo)).toFixed(2);

            row.querySelector('.valorAcrescimo').value = acrescimo.replace('.', ',');
            row.querySelector('.valorTotal').value = valorTotal.replace('.', ',');

            var isPaid = row.querySelector('.pago').checked;
            row.querySelector('.valorTotal').style.color = isPaid ? '#27ae60' : '#e74c3c';

            updateSummary();
        }

        function updateSummary() {
            var table = document.getElementById('dataTable');
            var totalPago = 0, totalNaoPago = 0;

            for (var i = 1; i < table.rows.length; i++) {
                var row = table.rows[i];
                var valorTotal = parseFloat(row.querySelector('.valorTotal').value.replace(',', '.')) || 0;
                if (row.querySelector('.pago').checked) {
                    totalPago += valorTotal;
                } else {
                    totalNaoPago += valorTotal;
                }
            }

            document.getElementById('totalPago').value = totalPago.toFixed(2).replace('.', ',');
            document.getElementById('totalNaoPago').value = totalNaoPago.toFixed(2).replace('.', ',');
        }

        // ==================== SALVAR / CARREGAR ====================
        function saveData() {
            var table = document.getElementById('dataTable');
            var data = [];

            for (var i = 1; i < table.rows.length; i++) {
                var row = table.rows[i];
                var rowData = {
                    conta: row.querySelector('.conta').value,
                    horario: row.querySelector('.horario').value,
                    data: row.querySelector('.data').value,
                    vencimento: row.querySelector('.vencimento').value,
                    aumento: row.querySelector('.aumento').value,
                    prazo: row.querySelector('.prazo').value,
                    valor: row.querySelector('.valor').value,
                    valorAcrescimo: row.querySelector('.valorAcrescimo').value,
                    valorTotal: row.querySelector('.valorTotal').value,
                    pago: row.querySelector('.pago').checked
                };
                data.push(rowData);
            }

            localStorage.setItem('financeData', JSON.stringify(data));
            localStorage.setItem('valorSalarial', document.getElementById('valorSalarial').value);
            alert('✅ Dados salvos com sucesso!');
        }

        // ==================== IMPORT / EXPORT EXCEL ====================
        function importExcel() {
            var input = document.createElement('input');
            input.type = 'file';
            input.accept = '.xlsx,.xls';
            input.onchange = function(e) {
                var file = e.target.files[0];
                if (!file) return;

                var reader = new FileReader();
                reader.onload = function(e) {
                    var data = new Uint8Array(e.target.result);
                    var workbook = XLSX.read(data, {type: 'array'});
                    var sheet = workbook.Sheets[workbook.SheetNames[0]];
                    var json = XLSX.utils.sheet_to_json(sheet, {header: 1});
                    
                    populateTable(json.slice(1)); // remove cabeçalho
                };
                reader.readAsArrayBuffer(file);
            };
            input.click();
        }

        function exportToExcel() {
            var table = document.getElementById('dataTable');
            var data = [];
            var headers = Array.from(table.rows[0].cells).map(cell => cell.textContent.trim());
            data.push(headers);

            for (var i = 1; i < table.rows.length; i++) {
                var row = [];
                var cells = table.rows[i].cells;
                for (var j = 0; j < cells.length; j++) {
                    var el = cells[j].querySelector('input, select');
                    if (el) {
                        if (el.type === 'checkbox') {
                            row.push(el.checked ? 'Sim' : 'Não');
                        } else {
                            row.push(el.value || '');
                        }
                    } else {
                        row.push('');
                    }
                }
                data.push(row);
            }

            var wb = XLSX.utils.book_new();
            var ws = XLSX.utils.aoa_to_sheet(data);
            XLSX.utils.book_append_sheet(wb, ws, 'Controle_Financeiro');
            XLSX.writeFile(wb, 'controle_financeiro.xlsx');
        }

        function populateTable(jsonRows) {
            var table = document.getElementById('dataTable');
            var template = table.rows[1].cloneNode(true);

            // Limpa todas as linhas exceto o cabeçalho
            while (table.rows.length > 1) {
                table.deleteRow(1);
            }

            jsonRows.forEach(function (rowData) {
                var newRow = template.cloneNode(true);
                
                newRow.querySelector('.conta').value = rowData[0] || '';
                newRow.querySelector('.horario').value = rowData[1] || '';
                newRow.querySelector('.data').value = rowData[2] || '';
                newRow.querySelector('.vencimento').value = rowData[3] || '';
                newRow.querySelector('.aumento').value = rowData[4] || '0';
                newRow.querySelector('.prazo').value = rowData[5] || 'Bradesco';
                newRow.querySelector('.valor').value = rowData[6] || '0.00';
                newRow.querySelector('.valorAcrescimo').value = rowData[7] || '0.00';
                newRow.querySelector('.valorTotal').value = rowData[8] || '0.00';
                
                var pagoEl = newRow.querySelector('.pago');
                pagoEl.checked = (rowData[9] === true || rowData[9] === 'Sim' || rowData[9] === 'true' || rowData[9] === 1);

                table.appendChild(newRow);
                calculateTotal(newRow.querySelector('.valor'));
            });

            if (table.rows.length === 1) addEmptyRow();
            updateSummary();
        }

        function addEmptyRow() {
            var table = document.getElementById('dataTable');
            var newRow = table.rows[1].cloneNode(true);
            
            newRow.querySelector('.conta').value = '';
            newRow.querySelector('.horario').value = '';
            newRow.querySelector('.data').value = '';
            newRow.querySelector('.vencimento').value = '';
            newRow.querySelector('.aumento').value = '0';
            newRow.querySelector('.prazo').value = 'Bradesco';
            newRow.querySelector('.valor').value = '0.00';
            newRow.querySelector('.valorAcrescimo').value = '0.00';
            newRow.querySelector('.valorTotal').value = '0.00';
            newRow.querySelector('.pago').checked = false;

            table.appendChild(newRow);
        }

        // ==================== INICIALIZAÇÃO ====================
        document.addEventListener('DOMContentLoaded', function() {
            // Carrega valor salarial
            var savedValor = localStorage.getItem('valorSalarial');
            if (savedValor) document.getElementById('valorSalarial').value = savedValor;

            // Carrega dados da tabela
            var savedData = localStorage.getItem('financeData');
            if (savedData) {
                var data = JSON.parse(savedData);
                var jsonRows = data.map(d => [
                    d.conta, d.horario, d.data, d.vencimento, 
                    d.aumento, d.prazo, d.valor, d.valorAcrescimo, 
                    d.valorTotal, d.pago
                ]);
                populateTable(jsonRows);
            } else {
                updateSummary();
            }
        });

        // Botão Nova Linha
        document.getElementById('addRowButton').addEventListener('click', addEmptyRow);
    </script>
</body>
</html>
