<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle Financeiro</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css">
    
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root {
            --primary-dark: #2c3e50;
            --success-green: #27ae60;
            --warning-red: #e74c3c;
            --accent-blue: #3498db;
            --table-header: #2c7a3f;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 50%, #2c7a3f 100%);
            color: #333;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .navbar { background-color: rgba(255,255,255,0.97); backdrop-filter: blur(12px); box-shadow: 0 4px 20px rgba(0,0,0,0.12); position: fixed; top: 0; width: 100%; z-index: 1000; }

        .container {
            max-width: 1280px;
            margin: 100px auto 40px;
            padding: 12px;
            background-color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border-radius: 16px;
        }

        h2 { text-align: center; color: var(--primary-dark); margin-bottom: 20px; }

        .summary { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; flex-wrap: wrap; }
        .summary label { display: flex; flex-direction: column; font-weight: 600; color: #444; min-width: 140px; }
        .summary input { padding: 10px 12px; font-size: 1rem; border-radius: 8px; border: 2px solid #ddd; }

        .buttons { text-align: center; margin: 20px 0; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
        .btn { padding: 9px 18px; border-radius: 50px; font-weight: 600; font-size: 0.95rem; }

        .table-container { overflow-x: auto; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); -webkit-overflow-scrolling: touch; }

        table { width: 100%; min-width: 920px; border-collapse: separate; border-spacing: 0; }
        th {
            background: linear-gradient(90deg, var(--table-header), #27ae60);
            color: white;
            padding: 10px 5px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 10;
            font-size: 0.9rem;
            white-space: nowrap;
        }
        td { padding: 5px 4px; vertical-align: middle; }

        td input.form-control, td select.form-select {
            font-size: 0.85rem;
            padding: 5px 6px;
            height: auto;
        }

        /* Larguras ajustadas para celular */
        .conta { min-width: 130px; }
        .horario { min-width: 92px; }
        .data, .vencimento { min-width: 105px; }
        .aumento { min-width: 80px; }
        .prazo { min-width: 85px; }
        .valor, .valorAcrescimo, .valorTotal { min-width: 88px; font-weight: 600; }

        tr:nth-child(even) { background-color: #f8f9fa; }
        tr:hover { background-color: #f0f8f7; }

        /* === CALENDÁRIO MUITO MENOR E OTIMIZADO PARA CELULAR === */
        .ui-datepicker {
            font-size: 0.78rem !important;
            width: 200px !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .ui-datepicker th, .ui-datepicker td {
            padding: 3px !important;
            font-size: 0.78rem;
        }

        .ui-datepicker .ui-datepicker-header {
            padding: 4px 0;
        }

        .ui-datepicker .ui-datepicker-title {
            font-size: 0.85rem;
        }

        /* Posicionamento melhor no mobile */
        .ui-datepicker {
            position: absolute !important;
            z-index: 1050 !important;
        }

        footer {
            margin-top: auto;
            padding: 15px;
            text-align: center;
            color: rgba(255,255,255,0.9);
            background: rgba(0, 0, 0, 0.3);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <!-- Navbar permanece igual -->
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="index2.html"><i class="fas fa-chart-line"></i> Controle Financeiro</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="index2.html"><i class="fas fa-home"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="dados_salvos.html"><i class="fas fa-database"></i> Dados Salvos</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html"><i class="fas fa-envelope"></i> Contato</a></li>
                    <li class="nav-item"><a class="nav-link active" href="index.html"><i class="fas fa-link"></i> Controle</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">      
        <h2><i class="fas fa-coins"></i> Controle Financeiro</h2>

        <div class="summary">
            <label>Valor Salarial: 
                <input type="text" id="valorSalarial" value="0.00" oninput="updateSummary()" class="form-control">
            </label>
            <label>Total Pago: 
                <input type="text" id="totalPago" value="0.00" readonly class="form-control">
            </label>
            <label>Total Não Pago: 
                <input type="text" id="totalNaoPago" value="0.00" readonly class="form-control">
            </label>
        </div>

        <div class="buttons">
            <button class="btn btn-primary" onclick="importExcel()"><i class="fas fa-upload"></i> Importar</button>
            <button class="btn btn-primary" onclick="exportToExcel()"><i class="fas fa-download"></i> Exportar</button>
            <button class="btn btn-primary" onclick="saveData()"><i class="fas fa-save"></i> Salvar</button>
            <button class="btn btn-success" id="addRowButton"><i class="fas fa-plus-circle"></i> Nova Linha</button>
        </div>

        <div class="table-container">
            <table id="dataTable" class="table table-bordered">
                <thead>
                    <tr>
                        <th>Contas</th>
                        <th>Horário</th>
                        <th>Data</th>
                        <th>Vencimento</th>
                        <th>Aumento (%)</th>
                        <th>Banco</th>
                        <th>Valor</th>
                        <th>Acréscimo</th>
                        <th>Valor Total</th>
                        <th>Pago</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><input type="text" class="conta form-control" value="" oninput="calculateTotal(this)"></td>
                        <td><input type="text" class="horario form-control" readonly onclick="displayCurrentTime(this)"></td>
                        <td><input type="text" class="data form-control" readonly onclick="showDatePicker(this)"></td>
                        <td><input type="text" class="vencimento form-control" readonly onclick="showDatePicker(this)"></td>
                        <td><input type="number" step="0.01" class="aumento form-control" value="0" oninput="calculateTotal(this)" placeholder="0.00"></td>
                        <td>
                            <select class="prazo form-select" onchange="calculateTotal(this)">
                                <option value="BB">BB</option>
                                <option value="Bradesco">Bradesco</option>
                                <option value="PAN">PAN</option>
                                <option value="CAIXA">Caixa</option>
                                <option value="Inter">Inter</option>
                                <option value="Bradesco" selected>Bradesco</option>
                            </select>
                        </td>
                        <td><input type="text" class="valor form-control" value="0.00" oninput="calculateTotal(this)"></td>
                        <td><input type="text" class="valorAcrescimo form-control" value="0.00" readonly></td>
                        <td><input type="text" class="valorTotal form-control" value="0.00" readonly></td>
                        <td><input type="checkbox" class="pago" onclick="calculateTotal(this)"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Controle Financeiro • gilmar chagas nobre • Todos os direitos reservados.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        $(function () {
            $.datepicker.regional['pt-BR'] = { /* mesmo de antes */ 
                closeText: 'Fechar', prevText: '◀', nextText: '▶', currentText: 'Hoje',
                monthNames: ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'],
                monthNamesShort: ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'],
                dayNamesMin: ['D','S','T','Q','Q','S','S'],
                dateFormat: 'yy-mm-dd', firstDay: 0
            };
            $.datepicker.setDefaults($.datepicker.regional['pt-BR']);
        });

        // Calendário compacto + data automática do sistema
        function showDatePicker(cell) {
            // Preenche com data de hoje automaticamente
            if (!cell.value) {
                cell.value = new Date().toISOString().split('T')[0];
            }

            $(cell).datepicker({
                dateFormat: 'yy-mm-dd',
                changeMonth: true,
                changeYear: true,
                showButtonPanel: true,
                beforeShow: function(input, inst) {
                    // Força posicionamento abaixo do campo no mobile
                    setTimeout(function() {
                        inst.dpDiv.css({
                            top: $(input).offset().top + $(input).outerHeight() + 5,
                            left: $(input).offset().left
                        });
                    }, 10);
                },
                onSelect: function(dateText) {
                    cell.value = dateText;
                    calculateTotal(cell);
                    $(this).datepicker("destroy");
                }
            }).datepicker("show");
        }

        function displayCurrentTime(cell) {
            var now = new Date();
            var time = now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            cell.value = time;
            calculateTotal(cell);
        }

        function calculateTotal(element) {
            var row = element.parentElement.parentElement;
            var valor = parseFloat(row.querySelector('.valor').value.replace(',', '.')) || 0;
            var aumento = parseFloat(row.querySelector('.aumento').value) || 0;
            
            var acrescimo = (valor * (aumento / 100)).toFixed(2);
            var valorTotal = (valor + parseFloat(acrescimo)).toFixed(2);

            row.querySelector('.valorAcrescimo').value = acrescimo.replace('.', ',');
            row.querySelector('.valorTotal').value = valorTotal.replace('.', ',');

            var isPaid = row.querySelector('.pago').checked;
            row.querySelector('.valorTotal').style.color = isPaid ? '#27ae60' : '#e74c3c';

            updateSummary();
        }

        function updateSummary() {
            var table = document.getElementById('dataTable');
            var totalPago = 0, totalNaoPago = 0;

            for (var i = 1, row; row = table.rows[i]; i++) {
                var valorTotal = parseFloat(row.querySelector('.valorTotal').value.replace(',', '.')) || 0;
                if (row.querySelector('.pago').checked) totalPago += valorTotal;
                else totalNaoPago += valorTotal;
            }

            document.getElementById('totalPago').value = totalPago.toFixed(2).replace('.', ',');
            document.getElementById('totalNaoPago').value = totalNaoPago.toFixed(2).replace('.', ',');
        }

        // As funções saveData, importExcel, exportToExcel, populateTable e addEmptyRow permanecem iguais às da versão anterior
        // (copie elas do código que eu te enviei antes se precisar)

        document.getElementById('addRowButton').addEventListener('click', function () {
            addEmptyRow();
        });

        // DOMContentLoaded (mesmo de antes)
        document.addEventListener('DOMContentLoaded', function() {
            // ... seu código de carregar dados do localStorage ...
        });
    </script>
</body>
</html>
